<body>
    <script>
        //1.arthmetic operators +,-,*,/,%.
        var a= 10
        var b= 7

       console.log(a+b)
       console.log(a-b)
       console.log(a*b)
       console.log(a%b)
       //2. assignment - assing values:"="
       var x = 10
       console.log(x+=5)
       console.log(x-=3)
       //3.comparsion
       var p= 25
       var q= 20
       console.log(p>q)
       console.log(p<q)
       console.log(p>=q)
       console.log(p<=q)


       const height1 ="170"
       const height2 = 170
       console.log(height1 == height2)
       console.log(height1 === height2)

       //logical operaters and or negation
       var isMember = true
       let Totalprice =300

       //and && :when both condition is true
       console.log( isMember && Totalprice >500)
     // or ||:if only condition is true then also output is true
      console.log(isMember|| Totalprice > 500)

    </script>
