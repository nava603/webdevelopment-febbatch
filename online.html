<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
        }

        .parent {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 4fr));
            gap: 30px;
            padding: 10px;
        }

        .product {
            border: 1px solid black;
            border-radius: 12px;
            text-align: center;
            padding: 10px;
            overflow: hidden;
            box-shadow: 0 0 8px black;
        }

        .product img {
            block-size: 200px;
            inline-size: 100%;
            object-fit: cover;

        }

        .product p {
            color: #ccc;
            text-decoration: underline;
        }

        .product h2 {
            font-family: cursive;
        }


        .product button {
            background-color: orange;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="parent">

        <div class="product">
            <img src="https://images.pexels.com/photos/969462/pexels-photo-969462.jpeg">
            <h2>Mobile</h2>
            <p>Rs 40000</p>
            <button>Add To Cart</button>
        </div>

        <div class="product">
            <img src="https://images.pexels.com/photos/2562992/pexels-photo-2562992.png">
            <h2>Shoes</h2>
            <p>Rs 4000</p>
            <button>Add To Cart</button>
        </div>


        <div class="product">
            <img src="https://images.pexels.com/photos/109371/pexels-photo-109371.jpeg">
            <h2>Laptop</h2>
            <p>Rs 50000</p>
            <button>Add To Cart</button>
        </div>



        <div class="product">
            <img src="https://images.pexels.com/photos/1649771/pexels-photo-1649771.jpeg">
            <h2>Headphone</h2>
            <p>Rs 2050</p>
            <button>Add To Cart</button>
        </div>


        <div class="product">
            <img src="https://images.pexels.com/photos/18910365/pexels-photo-18910365.jpeg">
            <h2>Ps- 5</h2>
            <p>Rs 35000</p>
            <button>Add To Cart</button>
        </div>


        <div class="product">
            <img src="https://images.pexels.com/photos/1002638/pexels-photo-1002638.jpeg">
            <h2>Camera</h2>
            <p>Rs 10000</p>
            <button>Add To Cart</button>
        </div>



    </div>
</body>

</html>
