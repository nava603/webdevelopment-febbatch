<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1>My Expense Tracker</h1>
            <p class="subtitle">Track your monthly spending</p>
        </header>

        <!-- Summary Cards Section -->
        <section class="cards-section">|
            <div class="card">
                <h3>Total Spent</h3>
                <p class="card-amount">$2,450</p>
            </div>
            <div class="card">
                <h3>Highest Category</h3>
                <p class="card-amount">Food ($850)</p>
            </div>
            <div class="card">
                <h3>Current Month</h3>
                <p class="card-amount">February</p>
            </div>
        </section>

        <!-- Expense Categories Section -->
        <section class="categories-section">
            <h2>Expense Categories</h2>
            <div class="categories-list">
                <div class="category-item">
                    <span class="category-name">Food</span>
                    <span class="category-amount">$850</span>
                </div>
                <div class="category-item">
                    <span class="category-name">Transport</span>
                    <span class="category-amount">$320</span>
                </div>
                <div class="category-item">
                    <span class="category-name">Shopping</span>
                    <span class="category-amount">$640</span>
                </div>
                <div class="category-item">
                    <span class="category-name">Entertainment</span>
                    <span class="category-amount">$290</span>
                </div>
            </div>
        </section>

     
    </div>
</body>

</html>
