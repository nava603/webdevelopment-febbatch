<!DOCTYPE html>
<html>

<head>
    <title>Walking Animation</title>
<style>
    body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(to top, #87ceeb 60%, #ffffff);
}

/* Scene */
.scene {
  inline-size: 100vw;
  block-size: 100vh;
  position: relative;
}

/* Sun */
.sun {
  inline-size: 80px;
  block-size: 80px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  inset-block-start: 50px;
  inset-inline-end: 100px;
}

/* Ground */
.ground {
  position: absolute;
  inset-block-end: 0;
  inline-size: 100%;
  block-size: 120px;
  background: #2ecc71;
}

/* Person */
.person {
  position: absolute;
  inset-block-end: 120px;
  inset-inline-start: -100px;
  animation: walk-forward 6s linear infinite;
}

/* Head */
.head {
  inline-size: 50px;
  block-size: 50px;
  background: #f1c27d;
  border-radius: 50%;
  margin: auto;
}

/* Body */
.body {
  inline-size: 40px;
  block-size: 80px;
  background: #34495e;
  margin: auto;
}

/* Eyes */
.left-eye, .right-eye {
  inline-size: 8px;
  block-size: 8px;
  background: black;
  border-radius: 50%;
  position: absolute;
  inset-block-start: 15px;
}

.left-eye {
  inset-inline-start: 12px;
}

.right-eye {
  inset-inline-end: 12px;
}

/* Arms */
.arm {
  inline-size: 12px;
  block-size: 70px;
  background: #f1c27d;
  position: absolute;
  inset-block-start: 55px;
  transform-origin: top center;
}

/* Left arm */
.left-arm {
  inset-inline-start: -10px;
  animation: left-arm-move 0.8s linear infinite;
}

/* Right arm */
.right-arm {
  inset-inline-end: -10px;
  animation: right-arm-move 0.8s linear infinite;
}

/* Bag */
.bag {
  inline-size: 30px;
  block-size: 30px;
  background: brown;
  position: absolute;
  inset-block-end: -30px;
  inset-inline-start: -10px;
  border-radius: 4px;
  animation: bag-swing 0.8s linear infinite;
}

/* Legs */
.leg {
  inline-size: 14px;
  block-size: 80px;
  background: black;
  position: absolute;
  inset-block-start: 125px;
  transform-origin: top center;
}

/* Left leg */
.left-leg {
  inset-inline-start: 8px;
  animation: left-leg-move 0.8s linear infinite;
}

/* Right leg */
.right-leg {
  inset-inline-end: 8px;
  animation: right-leg-move 0.8s linear infinite;
}

/* Movement across screen */
@keyframes walk-forward {
  0% { inset-inline-start: -100px; }
  100% { inset-inline-start: 110%; }
}

/* Arm animations */
@keyframes left-arm-move {
  0% { transform: rotate(40deg); }
  50% { transform: rotate(-40deg); }
  100% { transform: rotate(40deg); }
}

@keyframes right-arm-move {
  0% { transform: rotate(-40deg); }
  50% { transform: rotate(40deg); }
  100% { transform: rotate(-40deg); }
}

/* Leg animations */
@keyframes left-leg-move {
  0% { transform: rotate(-40deg); }
  50% { transform: rotate(40deg); }
  100% { transform: rotate(-40deg); }
}

@keyframes right-leg-move {
  0% { transform: rotate(40deg); }
  50% { transform: rotate(-40deg); }
  100% { transform: rotate(40deg); }
}

/* Bag swing */
@keyframes bag-swing {
  0% { transform: rotate(10deg); }
  50% { transform: rotate(-10deg); }
  100% { transform: rotate(10deg); }
}

</style>
</head>

<body>

    <div class="scene">
        <div class="sun"></div>
        <div class="ground"></div>

        <div class="person">
            <div class="head"></div>
            <div class="left-eye"></div>
            <div class="right-eye"></div>
            <div class="body"></div>

            <div class="arm left-arm"></div>

            <div class="arm right-arm">
                <div class="bag"></div>
            </div>

            <div class="leg left-leg"></div>
            <div class="leg right-leg"></div>
        </div>
    </div>

</body>

</html>
